<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡门 · CARMEN — 三幕小剧场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:#050408;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;overflow:hidden;
  font-family:'SimHei','Microsoft YaHei',sans-serif;
  user-select:none;-webkit-user-select:none;
}
#stageWrap{
  position:relative;
  background:#000;
  box-shadow:0 0 120px rgba(120,40,40,0.12), 0 30px 80px rgba(0,0,0,0.8);
}
#stageWrap canvas{
  display:block;
  image-rendering:pixelated;image-rendering:crisp-edges;
}
/* 微弱 LCD 网格 — NDS 质感 */
.lcd{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  background:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.10) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0 1px, transparent 1px 3px);
}
.glass{
  position:absolute;inset:0;pointer-events:none;z-index:6;
  background:linear-gradient(112deg,
    rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.008) 24%,
    transparent 36%, transparent 84%, rgba(255,255,255,0.015) 100%);
}

/* ============ 节目单 (浮在剧场实景之上) ============ */
#boot{
  position:absolute;inset:0;z-index:10;
  cursor:pointer;
  background:
    linear-gradient(180deg, rgba(4,3,8,0.72) 0%, rgba(4,3,8,0.12) 22%,
      rgba(4,3,8,0) 40%, rgba(4,3,8,0) 58%, rgba(4,3,8,0.2) 74%, rgba(4,3,8,0.82) 100%),
    radial-gradient(ellipse 130% 90% at 50% 48%, rgba(4,3,8,0) 42%, rgba(4,3,8,0.5) 100%);
  display:flex;flex-direction:column;justify-content:space-between;align-items:center;
  padding:26px 0 22px;
  transition:opacity 1.1s ease;
}
#boot.gone{opacity:0;pointer-events:none;}
.pb-top{ text-align:center; }
.pb-house{
  font-size:9px;color:#6a5a70;letter-spacing:6px;
  font-family:Georgia,serif;
  margin-bottom:7px;
}
.pb-rule{
  width:150px;height:1px;margin:0 auto 4px;
  background:linear-gradient(90deg, transparent, #8a6a34 20%, #d8b060 50%, #8a6a34 80%, transparent);
}
.pb-rule.thin{ width:90px;opacity:0.6; }
.pb-title{
  font-family:Georgia,'Times New Roman',serif;
  color:#e8c87a;font-size:40px;letter-spacing:15px;font-weight:normal;
  text-indent:15px;
  text-shadow:0 0 26px rgba(230,170,80,0.35), 0 2px 0 rgba(40,10,10,0.9);
  margin:6px 0 4px;
}
.pb-sub{
  color:#c0a0ac;font-size:12px;letter-spacing:7px;text-indent:7px;
  text-shadow:0 1px 3px rgba(0,0,0,0.9);
  margin-bottom:6px;
}
.pb-bottom{ text-align:center; }
.pb-acts{
  color:#907c94;font-size:10px;letter-spacing:3px;
  text-shadow:0 1px 3px rgba(0,0,0,0.9);
  margin-bottom:12px;
}
.pb-acts b{ color:#c8a468;font-weight:normal; }
.pb-enter{
  color:#e8d8b0;font-size:13px;letter-spacing:9px;text-indent:9px;
  text-shadow:0 0 14px rgba(230,180,90,0.4);
  animation:pbblink 2.4s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes pbblink{0%,100%{opacity:0.95}50%{opacity:0.3}}
.pb-keys{
  color:#4e4458;font-size:9px;letter-spacing:2px;
}
.footer{
  position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:9px;color:#2c2438;letter-spacing:3px;font-family:Arial;
}
.show-progress{position:absolute;top:0;left:0;right:0;height:4px;z-index:8;background:rgba(0,0,0,.62);opacity:0;transition:opacity .35s}.show-progress__fill{display:block;width:100%;height:100%;transform:scaleX(0);transform-origin:left center;background:#d8b060;box-shadow:0 0 8px rgba(216,176,96,.72);transition:transform .28s linear}.show-progress__percent{position:absolute;top:8px;right:10px;padding:2px 4px;background:rgba(5,4,8,.66);color:#e0d3b8;font:8px Arial;letter-spacing:0}.show-progress__percent::after{content:' · 演出进度';color:#83765f}body[data-show-state="running"] .show-progress,body[data-show-state="done"] .show-progress{opacity:1}
body[data-set-shell="blackbox"]{background:#020203}body[data-set-shell="blackbox"] #stageWrap{box-shadow:0 0 0 1px #38353a,0 28px 70px #000}body[data-set-shell="blackbox"] .lcd{opacity:.45}body[data-set-shell="blackbox"] .glass{display:none}
body[data-set-shell="electric"]{background:#070308}body[data-set-shell="electric"] #stageWrap{box-shadow:-18px 0 65px rgba(0,160,180,.13),18px 0 75px rgba(220,25,55,.22),0 28px 80px #000}body[data-set-shell="electric"] .lcd{opacity:.82;background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 2px),repeating-linear-gradient(90deg,rgba(210,30,60,.035) 0 1px,transparent 1px 4px)}body[data-set-shell="electric"] .show-progress__fill{background:#e72a45;box-shadow:0 0 9px #e72a45,0 0 16px rgba(0,185,195,.4)}
body[data-embedded="true"] .footer{display:none}
</style>
</head>
<body data-play-id="carmen" data-initial-set="plaza" data-default-language="zh">

<div id="stageWrap">
  <canvas id="outCanvas" width="800" height="480"></canvas>
  <div class="lcd"></div>
  <div class="glass"></div>
  <div id="showProgress" class="show-progress" role="progressbar" aria-label="演出进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><span id="progressFill" class="show-progress__fill"></span><span id="progressPercent" class="show-progress__percent">0%</span></div>
  <div id="boot">
    <div class="pb-top">
      <div class="pb-house">THÉÂTRE DE POCHE · 掌上剧场</div>
      <div class="pb-rule"></div>
      <div class="pb-title">CARMEN</div>
      <div class="pb-sub">比才 · 三幕歌剧《卡门》</div>
      <div class="pb-rule thin"></div>
    </div>
    <div class="pb-bottom">
      <div class="pb-acts"><b>第一幕</b> 哈巴涅拉 &nbsp;·&nbsp; <b>第二幕</b> 吉普赛之歌 &nbsp;·&nbsp; <b>第三幕</b> 宿命</div>
      <div class="pb-enter">点 击 开 演</div>
      <div class="pb-keys">M 静音 · R 重新开演</div>
    </div>
  </div>
</div>

<div class="footer">GEORGES BIZET, 1875 — AN NDS-STYLE THEATRE PIECE · 非商用致敬习作</div>

<canvas id="glCanvas" width="400" height="240" style="display:none;"></canvas>

<script src="../../shared/js/three.min.js"></script>
<script src="../../shared/js/core.js"></script>
<script src="js/audio.js"></script>
<script src="js/gfx.js"></script>
<script src="../../shared/js/theater.js"></script>
<script src="../../shared/js/actors.js"></script>
<script src="../../shared/js/theatre-shell.js"></script>
<script src="js/sets.js"></script>
<script src="js/director.js"></script>
<script src="js/play.js"></script>
<script src="../../shared/js/main.js"></script>
</body>
</html>
