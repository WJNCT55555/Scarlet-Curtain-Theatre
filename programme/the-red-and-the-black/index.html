<title>摇滚红与黑 · NDS 美学小剧场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#030305;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'SimHei','Microsoft YaHei',sans-serif;user-select:none;-webkit-user-select:none}
#stageWrap{position:relative;background:#000;box-shadow:0 0 130px rgba(190,12,30,.16),0 30px 90px rgba(0,0,0,.9)}
#stageWrap canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
.lcd{position:absolute;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,rgba(0,0,0,.11) 0 1px,transparent 1px 3px),repeating-linear-gradient(90deg,rgba(0,0,0,.055) 0 1px,transparent 1px 3px)}
.glass{position:absolute;inset:0;pointer-events:none;z-index:6;background:linear-gradient(112deg,rgba(255,255,255,.035),rgba(255,255,255,.008) 24%,transparent 36%,transparent 84%,rgba(255,255,255,.015))}
#boot{position:absolute;inset:0;z-index:10;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:25px 0 21px;transition:opacity 1.05s ease;background:linear-gradient(180deg,rgba(2,2,4,.82),rgba(2,2,4,.06) 31%,rgba(2,2,4,.08) 64%,rgba(2,2,4,.9)),radial-gradient(ellipse 80% 70% at 50% 48%,transparent 35%,rgba(120,0,16,.12) 70%,rgba(0,0,0,.72))}
#boot.gone{opacity:0;pointer-events:none}.pb-top,.pb-bottom{text-align:center}.pb-house{font:9px Georgia,serif;color:#776a70;letter-spacing:5px;margin-bottom:7px}.pb-rule{width:176px;height:1px;margin:0 auto 5px;background:linear-gradient(90deg,transparent,#7e0e22 18%,#e1263c 50%,#7e0e22 82%,transparent)}.pb-rule.thin{width:96px;opacity:.72}.pb-title{font:normal 42px Georgia,'Times New Roman',serif;color:#eee8df;letter-spacing:12px;text-indent:12px;text-shadow:3px 0 0 #821123,0 0 25px rgba(225,30,55,.42);margin:5px 0 2px}.pb-sub{color:#d6354d;font-size:12px;letter-spacing:6px;text-indent:6px;margin-bottom:7px}.pb-acts{color:#84777f;font-size:10px;letter-spacing:2px;margin-bottom:12px}.pb-acts b{color:#d63146;font-weight:normal}.pb-enter{color:#f0e7db;font-size:13px;letter-spacing:9px;text-indent:9px;text-shadow:0 0 15px rgba(255,34,66,.5);animation:blink 2.1s ease-in-out infinite;margin-bottom:10px}.pb-keys{color:#51464e;font-size:9px;letter-spacing:2px}.footer{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);white-space:nowrap;font:9px Arial;color:#30242c;letter-spacing:2px}@keyframes blink{0%,100%{opacity:.95}50%{opacity:.26}}
.show-progress{position:absolute;top:0;left:0;right:0;height:4px;z-index:8;background:rgba(0,0,0,.62);opacity:0;transition:opacity .35s}.show-progress__fill{display:block;width:100%;height:100%;transform:scaleX(0);transform-origin:left center;background:#e1263c;box-shadow:0 0 8px rgba(225,38,60,.75);transition:transform .28s linear}.show-progress__percent{position:absolute;top:8px;right:10px;padding:2px 4px;background:rgba(5,4,8,.66);color:#d8cbd0;font:8px Arial;letter-spacing:0}.show-progress__percent::after{content:' · 演出进度';color:#7d6d74}body[data-show-state="running"] .show-progress,body[data-show-state="done"] .show-progress{opacity:1}
body[data-set-shell="blackbox"]{background:#020203}body[data-set-shell="blackbox"] #stageWrap{box-shadow:0 0 0 1px #343238,0 28px 70px #000}body[data-set-shell="blackbox"] .lcd{opacity:.48}body[data-set-shell="blackbox"] .glass{display:none}
body[data-set-shell="electric"]{background:#070308}body[data-set-shell="electric"] #stageWrap{box-shadow:-18px 0 65px rgba(0,166,180,.14),18px 0 75px rgba(224,25,57,.24),0 28px 80px #000}body[data-set-shell="electric"] .lcd{opacity:.82;background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 2px),repeating-linear-gradient(90deg,rgba(200,20,50,.035) 0 1px,transparent 1px 4px)}body[data-set-shell="electric"] .show-progress__fill{background:#e7193a;box-shadow:0 0 9px #e7193a,0 0 16px rgba(0,190,200,.45)}
body[data-embedded="true"] .footer{display:none}
</style>
</head>
